<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étape 4 – À définir</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-header: FloralWhite ;
  --bg-note: FloralWhite ;
  --bg-card-intro: FloralWhite ;
  --bg-vignettes: FloralWhite ;

  --blue:       #333;
  --blue-light: #8497b0;
  --bg:         FloralWhite;
  --text:       #333;
  --shadow:     -6px 6px 20px rgba(0,0,0,0.15);
  --radius:     16px;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.4;
}

.page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 10px;
  max-width: 90%;
  margin: auto;
}

header {
  background: var(--bg-header);
  color: black;
  padding: 14px 20px;
  border-radius: var(--radius);
  text-align: center;
  flex-shrink: 0;
  height: 74px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
}
header h1 { font-size: 22px; font-weight: 700; margin-bottom: 3px; }
header p  { font-size: 14px; opacity: 0.85; }

.note {
  background: var(--bg-note);
  color: var(--text);
  padding: 10px 15px;
  border-radius: 12px;
  margin: 8px 0;
  text-align: center;
  font-size: 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}

main {
  flex: 1;
  overflow: hidden;
  display: flex;
  gap: 16px;
}

.main-zone {
  flex: 1;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow: auto;
}

.side-zone {
  width: 200px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ph-block {
  background: var(--bg);
  border: 2px dashed #b8d0f0;
  border-radius: 12px;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #7aaedc;
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  min-height: 80px;
  flex: 1;
  box-shadow: var(--shadow);
}

/* Carousel */
.carousel-wrapper {
  background: FloralWhite;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.carousel-image-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.carousel-image-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s ease;
}
.carousel-image-area img.fade { opacity: 0; }

.carousel-bottom {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding-top: 10px;
  border-top: 2px solid rgba(13,110,253,0.15);
  margin-top: 10px;
  flex-shrink: 0;
}

.carousel-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #002b45;
  letter-spacing: 0.03em;
}

.carousel-controls { display: flex; align-items: center; gap: 16px; }

.carousel-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid #0d6efd;
  background: transparent;
  color: #0d6efd;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.carousel-btn:hover { background: #0d6efd; color: white; }
.carousel-btn:disabled { opacity: 0.3; cursor: default; }

.carousel-dots { display: flex; gap: 8px; align-items: center; }
.carousel-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(13,110,253,0.25);
  cursor: pointer;
  transition: all 0.2s ease;
}
.carousel-dot.active { background: #0d6efd; transform: scale(1.3); }

@media (max-width: 768px) {
  .page { height: auto; min-height: 100vh; }
  header { height: auto; padding: 12px 16px; }
  .note  { height: auto; min-height: 44px; }
  main { overflow: visible; height: auto; flex-direction: column; }
  .side-zone { display: none; }
}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Étape 4 – À définir</h1>
    <p>Sous-titre de l'étape 4</p>
  </header>
  <div class="note">Note informative de l'étape 4</div>
  <main>
    <div class="main-zone">
      <div class="carousel-wrapper">
        <div class="carousel-image-area">
          <img id="carouselImg" src="calendrier.jpg" alt="Période 1">
        </div>
        <div class="carousel-bottom">
          <div class="carousel-title" id="carouselTitle">Période 1</div>
          <div class="carousel-controls">
            <button class="carousel-btn" id="carouselPrev">&#8592;</button>
            <div class="carousel-dots" id="carouselDots"></div>
            <button class="carousel-btn" id="carouselNext">&#8594;</button>
          </div>
        </div>
      </div>
    </div>
    <div class="side-zone">
      <div class="ph-block">Info A</div>
      <div class="ph-block">Info B</div>
      <div class="ph-block">Info C</div>
    </div>
  </main>
</div>

<script>
const carouselSlides = [
  { img: '../images/calendrier.jpg', title: 'Période 1' },
  { img: '../images/calendrier.jpg', title: 'Période 2' },
  { img: '../images/calendrier.jpg', title: 'Période 3' },
  { img: '../images/calendrier.jpg', title: 'Période 4' },
];

let carouselIndex = 0;

function carouselRender() {
  const img   = document.getElementById('carouselImg');
  const title = document.getElementById('carouselTitle');
  const dots  = document.getElementById('carouselDots');
  if (!img || !title || !dots) return;

  img.classList.add('fade');
  setTimeout(() => {
    img.src = carouselSlides[carouselIndex].img;
    img.alt = carouselSlides[carouselIndex].title;
    title.textContent = carouselSlides[carouselIndex].title;
    img.classList.remove('fade');
  }, 150);

  dots.innerHTML = '';
  carouselSlides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'carousel-dot' + (i === carouselIndex ? ' active' : '');
    d.onclick = () => { carouselIndex = i; carouselRender(); };
    dots.appendChild(d);
  });

  document.getElementById('carouselPrev').disabled = carouselIndex === 0;
  document.getElementById('carouselNext').disabled = carouselIndex === carouselSlides.length - 1;
}

document.getElementById('carouselPrev').addEventListener('click', () => {
  if (carouselIndex > 0) { carouselIndex--; carouselRender(); }
});
document.getElementById('carouselNext').addEventListener('click', () => {
  if (carouselIndex < carouselSlides.length - 1) { carouselIndex++; carouselRender(); }
});

document.addEventListener('DOMContentLoaded', carouselRender);
</script>
</body>
</html>
