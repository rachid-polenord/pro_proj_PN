<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étape 5 – À définir</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Couleurs modifiables ── */
  --bg-header: FloralWhite ;
  --bg-note: FloralWhite ;
  --bg-card-intro: FloralWhite ;
  --bg-vignettes: FloralWhite ;

  --blue:       #333;
  --blue-light: #8497b0;
  --bg:         FloralWhite;
  --text:       #333;
  --shadow:     -6px 6px 20px rgba(0,0,0,0.15);
  --radius:     16px;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.4;
}

.page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 10px;
  max-width: 90%;
  margin: auto;
}

header {
  background: var(--bg-header);
  color: black;
  padding: 14px 20px;
  border-radius: var(--radius);
  text-align: center;
  flex-shrink: 0;
  height: 74px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
}
header h1 { font-size: 22px; font-weight: 700; margin-bottom: 3px; }
header p  { font-size: 14px; opacity: 0.85; }

.note {
  background: var(--bg-note);
  color: var(--text);
  padding: 10px 15px;
  border-radius: 12px;
  margin: 8px 0;
  text-align: center;
  font-size: 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}

main {
  flex: 1;
  overflow: hidden;
  display: flex;
  gap: 16px;
}

.main-zone {
  flex: 1;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 20px;
  overflow: auto;
}

.side-zone {
  width: 200px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ph-block {
  background: var(--bg);
  border: 2px dashed #b8d0f0;
  border-radius: 12px;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #7aaedc;
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  min-height: 80px;
  flex: 1;
  box-shadow: var(--shadow);
}

@media (max-width: 768px) {
  .page { height: auto; min-height: 100vh; }
  header { height: auto; padding: 12px 16px; }
  .note  { height: auto; min-height: 44px; }
  main { overflow: visible; height: auto; flex-direction: column; }
  .side-zone { display: none; }
}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Étape 5 – À définir</h1>
    <p>Sous-titre de l'étape 5</p>
  </header>
  <div class="note">Note informative de l'étape 5</div>
  <main>
    <div class="main-zone">
      <div class="ph-block" style="flex:3;">Zone principale — à remplir</div>
    </div>
    <div class="side-zone">
      <div class="ph-block">Info A</div>
      <div class="ph-block">Info B</div>
      <div class="ph-block">Info C</div>
    </div>
  </main>
</div>
</body>
</html>
